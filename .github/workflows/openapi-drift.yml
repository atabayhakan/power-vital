name: OpenAPI drift check

on:
  pull_request:
    paths:
      - 'backend/src/**'
      - 'frontend/src/api/**'
      - 'frontend/openapi.json'
      - 'frontend/src/api/types.ts'
  push:
    branches: [main, master]
    paths:
      - 'backend/src/**'

jobs:
  drift:
    name: Verify frontend types match backend spec
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install openapi-typescript
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Generate types from checked-in spec
        working-directory: frontend
        run: |
          npx openapi-typescript openapi.json -o .types-baseline.ts

      - name: Download latest production spec
        working-directory: frontend
        env:
          OPENAPI_URL: ${{ vars.PRODUCTION_OPENAPI_URL }}
        run: |
          if [ -z "$OPENAPI_URL" ]; then
            echo "::warning::PRODUCTION_OPENAPI_URL not configured; skipping live drift check"
            exit 0
          fi
          curl -fsSL "$OPENAPI_URL" -o openapi-prod.json
          npx openapi-typescript openapi-prod.json -o .types-prod.ts

      - name: Diff types
        working-directory: frontend
        run: |
          if [ ! -f .types-prod.ts ]; then
            echo "✅ Live drift check skipped (no PRODUCTION_OPENAPI_URL)"
            exit 0
          fi
          if diff -q .types-baseline.ts .types-prod.ts > /dev/null; then
            echo "✅ Types in sync with production spec"
          else
            echo "❌ DRIFT DETECTED — frontend types.ts is out of sync with production spec"
            echo ""
            echo "## OpenAPI drift detected"
            echo ""
            echo "The OpenAPI spec served by production no longer matches the"
            echo "checked-in \`frontend/src/api/types.ts\`. This usually means:"
            echo ""
            echo "1. The backend was deployed with new/changed endpoints."
            echo "2. The frontend hasn't regenerated its types yet."
            echo ""
            echo "### How to fix"
            echo ""
            echo '```bash'
            echo "npm --prefix frontend run openapi:generate"
            echo "git add frontend/src/api/types.ts"
            echo "git commit -m 'chore: regenerate OpenAPI types'"
            echo '```'
            echo ""
            echo "### Diff (first 200 lines)"
            echo ""
            echo '```diff'
            diff -u .types-baseline.ts .types-prod.ts | head -n 200
            echo '```'
            exit 1
          fi

      - name: Build frontend (compile-time type check)
        working-directory: frontend
        run: |
          npm run typecheck
          npm run build

      - name: Backend type check
        working-directory: backend
        run: |
          npm ci --legacy-peer-deps || npm install
          npx tsc --noEmit