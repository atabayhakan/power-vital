name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly security scan (Monday 06:00 UTC). Catches new CVEs in
    # third-party packages that aren't on the active PR list.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Scan (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # TypeScript covers both backend (Node) and frontend (Vue).
          # We scan the whole repo so a single config catches both.
          - language: typescript
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Explicit queries: security-and-quality gives us both
          # vulnerability detection and a few lints (e.g. clear-text
          # logging, prototype pollution). The default "security-extended"
          # is similar but we want lints too.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"