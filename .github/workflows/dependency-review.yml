name: Dependency review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Audit new/changed dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the PR if any new dependency has a known vulnerability
          # of severity moderate or higher.
          fail-on-severity: moderate
          # Show the reviewer a summary comment on the PR.
          comment-summary-in-pr: always
          # Skip license checks entirely — we don't have a license policy
          # yet and false-positives are noisy.
          license-check: false