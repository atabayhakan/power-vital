# Bundle size budget — runs after `vite build` and fails the PR if any
# chunk exceeds its budget. See frontend/scripts/check-bundle-budget.mjs
# for the budget table.
name: bundle-budget

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/bundle-budget.yml'

jobs:
  build:
    name: vite build + budget check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund
      - name: Build production bundle
        run: npm run build
      - name: Check bundle size budget
        run: npm run check:bundle
      - name: Upload dist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: ignore