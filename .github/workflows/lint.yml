# ESLint CI — runs on PRs and pushes to main. Fast feedback for style /
# unused-vars / dead code problems. Does NOT block on warnings.
name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: frontend (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund
      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

  backend:
    name: backend (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund
      - name: Run ESLint
        run: npm run lint -- --max-warnings 0