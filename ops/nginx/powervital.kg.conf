# /etc/nginx/sites-available/powervital.kg
# Power Vital production nginx vhost.
#
# Cache strategy:
#   • index.html  → never cache (Cache-Control: no-store). Every request
#                    hits the backend → SPA always loads fresh JS/CSS hashes.
#   • /assets/*   → 1 year immutable. Filenames are content-hashed by
#                    Vite (e.g. index-ByqvbMcnY.js), so the URL changes
#                    whenever the content changes. Browsers + CDNs cache
#                    aggressively and revalidate only on URL change.
#   • /api/*      → never cache at the nginx layer. Cache-Control is
#                    set per-route by Express; nginx just forwards.
#   • /api/v1/store-reviews etc → already set Cache-Control + ETag
#     by Express handlers.
#
# gzip:
#   • Compress text responses ≥ 1024 bytes. SVG/JSON/JS/CSS benefit;
#     images are already compressed upstream.
#
# Security headers:
#   • CSP, HSTS, X-Frame-Options, X-Content-Type-Options — match what
#     Helmet sets on the backend. Some directives are duplicated so
#     a static-file response (served directly by nginx) also gets them.

# HTTP → HTTPS redirect (catch-all, served first).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name powervital.kg www.powervital.kg 193.160.119.100;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name powervital.kg www.powervital.kg;

    ssl_certificate     /etc/letsencrypt/live/powervital.kg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/powervital.kg/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP for the static SPA shell served directly by nginx. Helmet's CSP only
    # covers /api/* responses proxied to Express — the HTML document and its
    # bundle are served from disk here, so without this header index.html runs
    # with no CSP at all. Mirrors the backend policy: no inline scripts, styles
    # allow 'unsafe-inline' for Vue scoped styles, images allow data:/https:,
    # connect allows self + Sentry ingest (harmless when no DSN is configured).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; media-src 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;

    # ── gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/manifest+json
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── API → backend (PM2 on :3000) ────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 30 MB request limit — enough for media uploads via /api/v1/upload.
        client_max_body_size 30m;
        proxy_read_timeout 60s;

        # No caching at the nginx layer for API responses — Express sets
        # the right Cache-Control per route.
        add_header Cache-Control "no-store" always;
    }

    # ── /uploads/* → filesystem (no backend hop) ──────────────────────────
    location /uploads/ {
        alias /var/www/power-vital/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # ── Service worker — must NOT be cached aggressively ────────────────
    location = /sw.js {
        root /var/www/power-vital/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # ── Manifest + favicon ────────────────────────────────────────────────
    location = /manifest.json {
        root /var/www/power-vital/frontend/dist;
        add_header Cache-Control "public, max-age=3600" always;
    }
    location = /favicon.svg {
        root /var/www/power-vital/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ── SPA fallback — every unknown path returns index.html ─────────────
    # index.html is NEVER cached so users always get the latest bundle.
    location / {
        root /var/www/power-vital/frontend/dist;
        try_files $uri $uri/ /index.html;

        # For index.html specifically: never cache.
        location = / {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            # nginx add_header inheritance is all-or-nothing per level: because
            # this block sets its own add_header, it does NOT inherit the
            # server-level security headers. The homepage serves executable
            # HTML, so re-declare them here or it ships with no CSP/HSTS.
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; media-src 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
        }

        # Static assets (vite emits content-hashed filenames).
        location ~* ^/assets/.+\.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
            try_files $uri =404;
        }

        # Other root-level files (HTML pages) — short cache + must-revalidate.
        # Same add_header inheritance caveat as `location = /`: this block sets
        # its own header, so re-declare the security headers or a direct hit to
        # /index.html (or any .html) serves the executable shell with no CSP.
        location ~* \.(?:html)$ {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; media-src 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
        }
    }
}

# NOTE: there is intentionally NO plain-HTTP server block that serves the
# app. Port 80 is handled solely by the redirect block at the top of this
# file (server_name includes 193.160.119.100), which 301s every request —
# including raw-IP access — to HTTPS. A previous revision had a second
# port-80 block for the IP that proxied /api/ and served the SPA in
# cleartext; it also collided with the redirect block's server_name. It was
# removed so logins over the raw IP can never be submitted unencrypted.