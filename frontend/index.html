    <!-- Performance: preconnect to every external origin we touch.
         preconnect warms TCP+TLS; dns-prefetch is the cheap fallback for
         older browsers. crossorigin only when the request will carry
         credentials (e.g. font fetches). -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Fonts -->
    <!-- Outfit has NO Cyrillic glyphs, so Kyrgyz/Russian headings fell back to a
         system font (inconsistent letter sizes). Montserrat is a geometric sans
         with full Cyrillic (incl. ң ө ү) used as the Cyrillic fallback. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // 🛡️ Cleanup: only unregister stale workers from the DISABLED
      // VitePWA era — the current /sw.js is registered on demand by
      // usePushSubscription.ts and must NOT be touched.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => {
            // The active push worker lives at scope / and is named
            // 'push-worker' (or has a scriptURL ending in /sw.js).
            const isPvPushWorker = (reg.active?.scriptURL || reg.installing?.scriptURL || reg.waiting?.scriptURL || '').endsWith('/sw.js');
            if (!isPvPushWorker) {
              reg.unregister();
            }
          });
        });
      }
    </script>
  </body>
